server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Disable caching while iterating on the dashboard - the JSX is
    # compiled in the browser by babel-standalone, so any stale copy
    # would mask edits.
    location ~* \.(jsx|html|css|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
